<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Arcade Hub // Fixed Edition</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            background: #1a1c28;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            width: 440px;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Views management */
        .view { display: none; }
        .view.active { display: block; }

        /* Menu Styles */
        .menu-btn {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }
        .menu-btn:hover {
            background: #00ffcc;
            color: #0d0e15;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        /* Shared Dashboard Info */
        .score-board {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #ff0077;
        }

        /* --- GAME 1: TRACK MODE --- */
        .track {
            width: 100%;
            height: 30px;
            background-color: #111;
            position: relative;
            border-radius: 5px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .target-zone {
            position: absolute;
            left: 42.5%;
            width: 15%;
            height: 100%;
            background-color: rgba(0, 255, 204, 0.3);
            border-left: 2px dashed #00ffcc;
            border-right: 2px dashed #00ffcc;
            box-sizing: border-box;
        }
        .pin {
            position: absolute;
            left: 0%;
            width: 8px;
            height: 100%;
            background-color: #ff0077;
            box-shadow: 0 0 10px #ff0077;
            border-radius: 2px;
        }

        /* --- GAME 2: TIMER MATCH MODE --- */
        .unit-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .unit-btn {
            background: #111;
            border: 1px solid #333;
            color: #888;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
        }
        .unit-btn.active {
            border-color: #ff0077;
            color: #ff0077;
        }
        .setup-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        .arrow-btn {
            font-size: 1.8rem;
            cursor: pointer;
            color: #ff0077;
            user-select: none;
        }
        .arrow-btn:hover { color: #fff; }
        .setup-display {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            min-width: 160px;
        }
        .challenge-options {
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .challenge-options label {
            cursor: pointer;
            user-select: none;
        }
        .timer-panel {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .live-timer {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }
        .live-timer.hidden-time {
            color: #222;
            text-shadow: none;
        }

        /* Universal Controls */
        .action-btn {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }
        .action-btn:hover {
            background: #00ffcc;
            color: #0d0e15;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #ff0077; }
        .message {
            height: 20px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Reflex Arcade</h1>

        <!-- ================= MAIN MENU ================= -->
        <div id="view-menu" class="view active">
            <p style="color: #888; margin-bottom: 30px;">CHOOSE YOUR PARADIGM</p>
            <button class="menu-btn" onclick="switchView('game1')">Mode 1: Laser Pin</button>
            <button class="menu-btn" onclick="switchView('game2')">Mode 2: Precision Timer</button>
            <p style="font-size: 0.8rem; color: #555; margin-top: 20px;">Click a mode above to play</p>
        </div>

        <!-- ================= GAME 1 VIEW ================= -->
        <div id="view-game1" class="view">
            <div class="score-board">SCORE: <span id="g1-score">0</span> | BEST: <span id="g1-high">0</span></div>
            <div class="track">
                <div class="target-zone"></div>
                <div class="pin" id="pin"></div>
            </div>
            <button id="g1-btn" class="action-btn">STOP (Space)</button>
            <div id="g1-message" class="message">Press Space to Start</div>
            <div class="back-link" onclick="exitToMenu()">◀ Return to Main Menu</div>
        </div>

        <!-- ================= GAME 2 VIEW ================= -->
        <div id="view-game2" class="view">
            <div class="score-board">MATCHES CAPTURED: <span id="g2-score">0</span></div>
            
            <!-- Setup Sub-Panel -->
            <div id="g2-setup">
                <p style="margin: 0 0 10px 0;">SET TARGET DURATION</p>
                <div class="unit-toggle">
                    <button id="unit-sec" class="unit-btn active" onclick="setUnit('sec')">SECONDS</button>
                    <button id="unit-min" class="unit-btn" onclick="setUnit('min')">MINUTES</button>
                </div>
                <div class="setup-row">
                    <div class="arrow-btn" onclick="adjustTarget(-1)">◀</div>
                    <div id="g2-setup-txt" class="setup-display">5 Secs</div>
                    <div class="arrow-btn" onclick="adjustTarget(1)">▶</div>
                </div>
                <div class="challenge-options">
                    <label>
                        <input type="checkbox" id="blind-mode-chk"> ⚠️ BLIND MODE (Hide Clock While Running)
                    </label>
                </div>
            </div>

            <!-- Running Clock Sub-Panel -->
            <div class="timer-panel">
                <div style="font-size: 0.85rem; color:#888; margin-bottom: 5px;">STOP WATCH TIME</div>
                <div id="g2-clock" class="live-timer">00:00.000</div>
            </div>

            <button id="g2-btn" class="action-btn">START CLOCK (Space)</button>
            <div id="g2-message" class="message">Lock your targets & hit Space</div>
            <div class="back-link" onclick="exitToMenu()">◀ Return to Main Menu</div>
        </div>
    </div>

    <script>
        // DOM Elements
        const views = {
            menu: document.getElementById('view-menu'),
            game1: document.getElementById('view-game1'),
            game2: document.getElementById('view-game2')
        };

        let currentActiveView = 'menu';

        function switchView(target) {
            views[currentActiveView].classList.remove('active');
            views[target].classList.add('active');
            currentActiveView = target;
            resetAllStates();
        }

        function exitToMenu() {
            switchView('menu');
        }

        /* ==================== MODE 1 CODE ==================== */
        const pin = document.getElementById('pin');
        const g1Btn = document.getElementById('g1-btn');
        const g1ScoreDiv = document.getElementById('g1-score');
        const g1HighDiv = document.getElementById('g1-high');
        const g1Message = document.getElementById('g1-message');

        let g1Pos = 0, g1Dir = 1, g1Speed = 2, g1Score = 0, g1High = 0, g1Playing = false, g1Interval;

        function updateGame1() {
            g1Pos += g1Speed * g1Dir;
            if (g1Pos >= 98) { g1Pos = 98; g1Dir = -1; }
            else if (g1Pos <= 0) { g1Pos = 0; g1Dir = 1; }
            pin.style.left = g1Pos + '%';
        }

        function handleGame1Input() {
            if (!g1Playing) {
                g1Playing = true; g1Score = 0; g1Speed = 2;
                g1ScoreDiv.textContent = g1Score;
                g1Message.textContent = "HIT THE ZONE!"; g1Message.style.color = "#00ffcc";
                g1Btn.textContent = "STOP";
                g1Interval = setInterval(updateGame1, 10);
                return;
            }
            if (g1Pos >= 42.5 && g1Pos <= 57.5) {
                g1Score++; g1Speed += 0.5;
                g1ScoreDiv.textContent = g1Score;
                g1Message.textContent = "CRITICAL HIT!"; g1Message.style.color = "#00ffcc";
                pin.style.backgroundColor = '#fff';
                setTimeout(() => pin.style.backgroundColor = '#ff0077', 100);
            } else {
                g1Playing = false; clearInterval(g1Interval);
                g1Message.textContent = "SYSTEM FAILURE. YOU MISSED."; g1Message.style.color = "#ff0077";
                g1Btn.textContent = "RETRY";
                if (g1Score > g1High) { g1High = g1Score; g1HighDiv.textContent = g1High; }
            }
        }


        /* ==================== MODE 2 CODE ==================== */
        const g2SetupPanel = document.getElementById('g2-setup');
        const g2SetupText = document.getElementById('g2-setup-txt');
        const g2ClockText = document.getElementById('g2-clock');
        const g2Btn = document.getElementById('g2-btn');
        const g2Message = document.getElementById('g2-message');
        const g2ScoreDiv = document.getElementById('g2-score');
        const unitSecBtn = document.getElementById('unit-sec');
        const unitMinBtn = document.getElementById('unit-min');
        const blindModeChk = document.getElementById('blind-mode-chk');

        let targetUnit = 'sec'; 
        let targetValue = 5;    
        let g2Score = 0;
        let g2Playing = false;
        let g2StartTime = 0;
        let g2AnimFrame;

        function setUnit(unit) {
            if (g2Playing) return;
            targetUnit = unit;
            if (unit === 'sec') {
                unitSecBtn.classList.add('active');
                unitMinBtn.classList.remove('active');
                targetValue = 5; 
            } else {
                unitMinBtn.classList.add('active');
                unitSecBtn.classList.remove('active');
                targetValue = 1; 
            }
            updateSetupDisplay();
        }

        function adjustTarget(dir) {
            if (g2Playing) return;
            if (targetUnit === 'sec') {
                targetValue += dir * 5; 
                if (targetValue < 5) targetValue = 60;
                if (targetValue > 60) targetValue = 5;
            } else {
                targetValue += dir; 
                if (targetValue < 1) targetValue = 5;
                if (targetValue > 5) targetValue = 1;
            }
            updateSetupDisplay();
        }

        function updateSetupDisplay() {
            if (targetUnit === 'sec') {
                g2SetupText.textContent = `${targetValue} Secs`;
            } else {
                g2SetupText.textContent = `${targetValue} Min${targetValue > 1 ? 's' : ''}`;
            }
        }

        function formatMsDisplay(totalMs) {
            const mins = Math.floor(totalMs / 60000);
            const secs = Math.floor((totalMs % 60000) / 1000);
            const ms = Math.floor(totalMs % 1000);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
        }

        function runGame2Clock() {
            if (!g2Playing) return;
            const elapsed = performance.now() - g2StartTime;
            
            if (blindModeChk.checked) {
                g2ClockText.textContent = "??:??.???"
                g2ClockText.classList.add('hidden-time');
            } else {
                g2ClockText.textContent = formatMsDisplay(elapsed);
                g2ClockText.classList.remove('hidden-time');
            }
            
            g2AnimFrame = requestAnimationFrame(runGame2Clock);
        }

        function handleGame2Input() {
            const targetMs = targetUnit === 'sec' ? targetValue * 1000 : targetValue * 60000;

            if (!g2Playing) {
                g2Playing = true;
                g2SetupPanel.style.opacity = "0.2"; 
                g2Btn.textContent = "STOP CLOCK";
                g2Message.textContent = `Stop precisely at: ${formatMsDisplay(targetMs)}`;
                g2Message.style.color = "#00ffcc";
                
                gStartTime = performance.now();
                g2StartTime = performance.now();
                g2AnimFrame = requestAnimationFrame(runGame2Clock);
                return;
            }

            g2Playing = false;
            cancelAnimationFrame(g2AnimFrame);
            g2ClockText.classList.remove('hidden-time');
            
            const absoluteFinalTime = performance.now() - g2StartTime;
            g2ClockText.textContent = formatMsDisplay(absoluteFinalTime);

            const variance = Math.abs(absoluteFinalTime - targetMs);

            if (variance <= 250) {
                g2Score++;
                g2ScoreDiv.textContent = g2Score;
                g2Message.textContent = `TARGET LOCKED! Off by ${variance.toFixed(0)}ms.`;
                g2Message.style.color = "#00ffcc";
                g2Btn.textContent = "NEXT RUN";
            } else {
                g2Message.textContent = `DESYNC ERROR: Missed by ${variance.toFixed(0)}ms.`;
                g2Message.style.color = "#ff0077";
                g2Btn.textContent = "RETRY MATCH";
                g2Score = 0;
                g2ScoreDiv.textContent = g2Score;
            }
            g2SetupPanel.style.opacity = "1";
        }

        /* ================= RESET AND ROUTING ================= */
        function resetAllStates() {
            // Reset Game 1
            clearInterval(g1Interval);
            g1Playing = false;
            g1Btn.textContent = "START GAME";
            g1Message.textContent = "Press Space to Start";
            g1Message.style.color = "#00ffcc";
            g1Pos = 0; pin.style.left = '0%';

            // Reset Game 2
            cancelAnimationFrame(g2AnimFrame);
            g2Playing = false;
            g2SetupPanel.style.opacity = "1";
            g2Btn.textContent = "START CLOCK";
            g2Message.textContent = "Lock your targets & hit Space";
            g2Message.style.color = "#00ffcc";
            g2ClockText.textContent = "00:00.000";
            g2ClockText.classList.remove('hidden-time');
        }

        function triggerInputEvent() {
            if (currentActiveView === 'game1') handleGame1Input();
            if (currentActiveView === 'game2') handleGame2Input();
        }

        g1Btn.addEventListener('click', (e) => { e.blur(); triggerInputEvent(); });
        g2Btn.addEventListener('click', (e) => { e.blur(); triggerInputEvent(); });

        window.addEventListener('keydown', (e) => {
            // If we are in the main menu, ignore the spacebar so it doesn't break routing
            if (currentActiveView === 'menu') return; 
            
            if (e.code === 'Space') {
                e.preventDefault();
                triggerInputEvent();
            }
        });
    </script>
</body>
</html>
